<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded indigo background -->
  <rect width="32" height="32" rx="7" fill="#4a40db"/>
  <!-- Spin axis — poles extend just beyond the outer ring -->
  <line x1="16" y1="4" x2="16" y2="28" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.6"/>
  <!-- Outer gimbal ring -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Gyroscope wheel at a tilt (gives 3-D depth) -->
  <ellipse cx="16" cy="16" rx="7" ry="2.8" fill="none" stroke="white" stroke-width="2" transform="rotate(-28 16 16)"/>
  <!-- Center bearing -->
  <circle cx="16" cy="16" r="2.2" fill="white"/>
</svg>
